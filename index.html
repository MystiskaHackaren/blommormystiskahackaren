<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blomigenkänning – Erik (Na Aranäs)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 0 15px;
      background: #f9f9f9;
      color: #333;
    }
    h1 { color: #1a5f7a; text-align: center; }
    .info { text-align: center; font-size: 1.1em; margin-bottom: 25px; }
    #status {
      font-weight: bold;
      padding: 12px;
      border-radius: 6px;
      margin: 20px 0;
      text-align: center;
      min-height: 24px;
    }
    #status.loading { background: #fff3cd; color: #856404; }
    #status.ready   { background: #d4edda; color: #155724; }
    #status.error   { background: #f8d7da; color: #721c24; }
    .container { text-align: center; }
    img#preview {
      max-width: 100%;
      max-height: 380px;
      border: 3px solid #ddd;
      border-radius: 8px;
      margin: 20px auto;
      display: block;
    }
    input[type="file"] { margin: 20px 0; }
    button {
      background: #1a5f7a;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 1.1em;
      border-radius: 6px;
      cursor: pointer;
      margin: 15px 0;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #result {
      font-size: 1.4em;
      margin: 30px 0;
      padding: 20px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      min-height: 80px;
    }
    .high { color: #28a745; font-weight: bold; }
    .medium { color: #fd7e14; font-weight: bold; }
    .low { color: #dc3545; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Blomigenkänning med TensorFlow.js</h1>
  <p class="info"><strong>Ditt Förnamn Efternamn – Klass X</strong><br>(MobileNetV2 finjusterad på 5 blomarter)</p>

  <div id="status" class="loading">Laddar modell… (kan ta 10–40 sek första gången)</div>

  <div class="container">
    <input type="file" id="imageUpload" accept="image/*">
    <br>
    <img id="preview" src="" alt="" style="display:none;">
    <br>
    <button id="predictBtn" disabled>Förutsäg blomma</button>
  </div>

  <div id="result"></div>

  <script>
    const status = document.getElementById('status');
    const predictBtn = document.getElementById('predictBtn');
    const imageUpload = document.getElementById('imageUpload');
    const preview = document.getElementById('preview');
    const resultDiv = document.getElementById('result');

    let model = null;

    // Ladda modellen
    async function loadModel() {
      try {
        status.textContent = "Laddar MobileNetV2-modell från tfjs_model/...";
        status.className = "loading";

        model = await tf.loadLayersModel('./tfjs_model/model.json');

        status.textContent = "Modellen är laddad och klar!";
        status.className = "ready";
        predictBtn.disabled = false;
      } catch (err) {
        status.textContent = "Kunde inte ladda modellen: " + err.message;
        status.className = "error";
        console.error(err);
      }
    }

    // Visa förhandsgranskning av bilden
    imageUpload.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = ev => {
        preview.src = ev.target.result;
        preview.style.display = 'block';
        resultDiv.innerHTML = ''; // rensa tidigare resultat
      };
      reader.readAsDataURL(file);
    });

    // Förutsägelse när man klickar på knappen
    predictBtn.addEventListener('click', async () => {
      if (!model) return alert("Modellen har inte laddats än.");
      if (!preview.src) return alert("Ladda upp en bild först!");

      status.textContent = "Analyserar bilden...";
      resultDiv.innerHTML = "";

      try {
        // Läs bild → tensor
        const imgElement = document.getElementById('preview');
        let tensor = tf.browser.fromPixels(imgElement)
          .resizeNearestNeighbor([224, 224])
          .toFloat()
          .expandDims(0);  // → [1, 224, 224, 3]

        // MobileNetV2-förbehandling: skala till [-1, 1]
        tensor = tensor.div(127.5).sub(1.0);

        // Kör modellen (ger logits)
        const logits = model.predict(tensor);
        const probabilities = await logits.softmax().data();

        // Hitta högsta sannolikheten
        let maxProb = -1;
        let maxIdx = -1;
        for (let i = 0; i < probabilities.length; i++) {
          if (probabilities[i] > maxProb) {
            maxProb = probabilities[i];
            maxIdx = i;
          }
        }

        // Dina 5 klasser – byt ut mot dina riktiga namn och rätt ordning!
        const classNames = [
          "Präskage",      // index 0
          "Maskros",       // 1
          "Roser",      // 2
          "solros",  // 3
          "tulpan"      // 4
        ];

        const predictedClass = classNames[maxIdx] || "Okänd klass";
        const confidence = (maxProb * 100).toFixed(1);

        let confidenceText = `Sannolikhet: <strong>${confidence} %</strong>`;
        let classText = `Blomma: <strong>${predictedClass}</strong>`;

        if (maxProb >= 0.75) {
          resultDiv.innerHTML = `<span class="high">${classText}<br>${confidenceText}</span>`;
        } else if (maxProb >= 0.50) {
          resultDiv.innerHTML = `<span class="medium">${classText}<br>${confidenceText} (osäker)</span>`;
        } else {
          resultDiv.innerHTML = `<span class="low">${classText}<br>${confidenceText} (mycket osäker – kanske inte en av de tränade arterna)</span>`;
        }

        // Städa minne
        tensor.dispose();
        logits.dispose();

        status.textContent = "Färdig!";
      } catch (err) {
        status.textContent = "Fel vid förutsägelse: " + err.message;
        status.className = "error";
        console.error(err);
      }
    });

    // Starta laddning direkt när sidan öppnas
    loadModel();
  </script>

</body>
</html>
