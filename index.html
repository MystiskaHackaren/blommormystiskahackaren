<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Blomdetektor – Erik Engblom (Na24B)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --neon-pink:   #ff00aa;
      --neon-cyan:   #00f0ff;
      --neon-lime:   #39ff14;
      --neon-magenta:#ff2eff;
      --neon-purple: #b300ff;
      --bg-dark:     #0d001a;
      --bg-mid:      #140028;
      --card:        rgba(20, 0, 40, 0.75);
      --text:        #f0f0ff;
      --glow:        0 0 15px;
      --glow-strong: 0 0 25px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0d001a 0%, #1a0033 50%, #0d001a 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 25px 15px 70px;
      background-image: 
        radial-gradient(circle at 15% 25%, rgba(255,0,170,0.12) 0%, transparent 30%),
        radial-gradient(circle at 85% 75%, rgba(0,240,255,0.10) 0%, transparent 35%);
    }

    .container { max-width: 900px; margin: 0 auto; }

    header { text-align: center; margin: 1.5rem 0 3rem; }

    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-lime));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
      text-shadow: var(--glow) var(--neon-pink), var(--glow-strong) var(--neon-cyan);
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--neon-cyan);
      font-size: 1.3rem;
      text-shadow: var(--glow) var(--neon-cyan);
      margin-bottom: 0.6rem;
    }

    .your-name {
      color: var(--neon-lime);
      font-weight: 700;
      font-size: 1.25rem;
      text-shadow: var(--glow) var(--neon-lime);
    }

    #status {
      padding: 1.2rem 2rem;
      border-radius: 16px;
      margin: 1.8rem 0;
      font-weight: 700;
      text-align: center;
      background: var(--card);
      border: 2px solid var(--neon-magenta);
      box-shadow: var(--glow-strong) var(--neon-magenta);
      backdrop-filter: blur(6px);
      transition: all 0.4s;
    }

    #status.loading {
      border-color: var(--neon-lime);
      box-shadow: var(--glow-strong) var(--neon-lime);
      color: var(--neon-lime);
    }

    #status.ready {
      border-color: var(--neon-cyan);
      box-shadow: var(--glow-strong) var(--neon-cyan);
      color: var(--neon-cyan);
    }

    #status.error {
      border-color: #ff3366;
      box-shadow: var(--glow-strong) #ff3366;
      color: #ff99cc;
    }

    .upload-area {
      background: var(--card);
      border: 3px dashed var(--neon-pink);
      border-radius: 20px;
      padding: 3rem 1.5rem;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
      margin: 2rem 0;
      box-shadow: var(--glow) var(--neon-pink);
      backdrop-filter: blur(8px);
    }

    .upload-area:hover {
      border-color: var(--neon-cyan);
      box-shadow: var(--glow-strong) var(--neon-cyan);
      transform: scale(1.02);
    }

    .upload-area i {
      font-size: 4rem;
      color: var(--neon-magenta);
      margin-bottom: 1.2rem;
      text-shadow: var(--glow) var(--neon-magenta);
    }

    #preview {
      max-width: 100%;
      max-height: 440px;
      border-radius: 20px;
      margin: 2rem auto 1.5rem;
      box-shadow: var(--glow-strong) var(--neon-purple), inset 0 0 20px rgba(255,0,170,0.15);
      border: 2px solid var(--neon-purple);
      display: block;
      object-fit: contain;
      background: rgba(0,0,0,0.4);
    }

    button#predictBtn {
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-magenta), var(--neon-cyan));
      background-size: 200% 200%;
      animation: gradientFlow 6s ease infinite;
      color: white;
      border: none;
      padding: 1.2rem 3rem;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 60px;
      cursor: pointer;
      margin: 2rem auto;
      display: block;
      box-shadow: var(--glow-strong) var(--neon-pink);
      text-shadow: 0 0 10px black;
      transition: all 0.3s;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    button#predictBtn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: var(--glow-strong) var(--neon-cyan), 0 0 40px var(--neon-magenta);
    }

    button#predictBtn:disabled {
      background: #444;
      box-shadow: none;
      opacity: 0.6;
      cursor: not-allowed;
    }

    #result {
      background: var(--card);
      border-radius: 20px;
      padding: 2.2rem;
      margin: 2.5rem 0;
      box-shadow: var(--glow-strong) var(--neon-lime);
      font-size: 1.5rem;
      line-height: 1.5;
      backdrop-filter: blur(10px);
      border: 2px solid var(--neon-lime);
      min-height: 140px;
    }

    .confidence-high   { color: var(--neon-lime);   text-shadow: var(--glow) var(--neon-lime); }
    .confidence-medium { color: var(--neon-yellow); text-shadow: var(--glow) var(--neon-yellow); }
    .confidence-low    { color: #ff66cc;            text-shadow: var(--glow) #ff66cc; }

    .flower-emoji { font-size: 2rem; margin-right: 0.5rem; }

    footer {
      text-align: center;
      margin-top: 5rem;
      color: var(--neon-cyan);
      font-size: 1rem;
      text-shadow: var(--glow) var(--neon-cyan);
      opacity: 0.8;
    }

    @media (max-width: 560px) {
      h1 { font-size: 2.4rem; }
      .upload-area { padding: 2.5rem 1rem; }
      button#predictBtn { padding: 1rem 2.5rem; font-size: 1.15rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Neon Blomdetektor 🌸⚡️</h1>
      <div class="subtitle">
        AI som lyser upp dina blommor
      </div>
      <div class="your-name">
        Ditt Förnamn Efternamn – Klass X
      </div>
    </header>

    <div id="status" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Laddar neon-modellen...
    </div>

    <label for="imageUpload">
      <div class="upload-area" id="dropArea">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Släpp en blomma hit eller klicka</p>
        <small>jpg • png • webp</small>
      </div>
    </label>

    <input type="file" id="imageUpload" accept="image/*" hidden>

    <img id="preview" src="" alt="Din neon-blomma" style="display:none;">

    <button id="predictBtn" disabled>
      <i class="fas fa-bolt"></i> Analysera i neon
    </button>

    <div id="result"></div>

    <footer>
      TensorFlow.js × MobileNetV2 × Neon Vibes • Skolprojekt 2026
    </footer>
  </div>

  <script>
    const status = document.getElementById('status');
    const predictBtn = document.getElementById('predictBtn');
    const imageUpload = document.getElementById('imageUpload');
    const preview = document.getElementById('preview');
    const resultDiv = document.getElementById('result');
    const dropArea = document.getElementById('dropArea');

    let model = null;

    async function loadModel() {
      try {
        model = await tf.loadLayersModel('./tfjs_model/model.json');
        status.innerHTML = '<i class="fas fa-check-circle"></i> Neon-modellen är laddad!';
        status.className = 'ready';
        predictBtn.disabled = false;
      } catch (err) {
        status.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Fel vid laddning...';
        status.className = 'error';
        console.error(err);
      }
    }

    function showPreview(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        resultDiv.innerHTML = '';
      };
      reader.readAsDataURL(file);
    }

    imageUpload.addEventListener('change', e => showPreview(e.target.files[0]));

    ['dragover', 'dragenter'].forEach(evt => dropArea.addEventListener(evt, e => {
      e.preventDefault();
      dropArea.style.borderColor = 'var(--neon-cyan)';
      dropArea.style.boxShadow = 'var(--glow-strong) var(--neon-cyan)';
    }));

    ['dragleave', 'drop'].forEach(evt => dropArea.addEventListener(evt, e => {
      e.preventDefault();
      dropArea.style.borderColor = 'var(--neon-pink)';
      dropArea.style.boxShadow = 'var(--glow) var(--neon-pink)';
    }));

    dropArea.addEventListener('drop', e => {
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        imageUpload.files = e.dataTransfer.files;
        showPreview(file);
      }
    });

    predictBtn.addEventListener('click', async () => {
      if (!model || !preview.src) return;

      status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Neon-analys pågår...';
      resultDiv.innerHTML = '';

      try {
        const img = document.getElementById('preview');
        let tensor = tf.browser.fromPixels(img)
          .resizeNearestNeighbor([224, 224])
          .toFloat()
          .expandDims(0);

        tensor = tensor.div(127.5).sub(1.0);

        const logits = model.predict(tensor);
        const probs = await logits.softmax().data();

        let maxProb = -Infinity, maxIdx = -1;
        for (let i = 0; i < probs.length; i++) {
          if (probs[i] > maxProb) {
            maxProb = probs[i];
            maxIdx = i;
          }
        }

        const classNames = [
          "Präskage",   // 0
          "Maskros",    // 1
          "Roser",      // 2
          "solros",     // 3
          "tulpan"      // 4
        ];

        const predicted = classNames[maxIdx] || "Okänd art";
        const conf = (maxProb * 100).toFixed(1);
        let cls = "", emoji = "🌸";

        if (maxProb >= 0.75) {
          cls = "confidence-high";
          emoji = "🌺⚡️";
        } else if (maxProb >= 0.50) {
          cls = "confidence-medium";
          emoji = "🌻✨";
        } else {
          cls = "confidence-low";
          emoji = "❓💥";
        }

        resultDiv.innerHTML = `
          <div class="${cls}">
            <span class="flower-emoji">${emoji}</span>
            <strong>${predicted}</strong><br>
            ${conf} % säkerhet
          </div>
        `;

        tensor.dispose();
        logits.dispose();

        status.innerHTML = '<i class="fas fa-bolt"></i> Neon-resultat klart!';
      } catch (err) {
        status.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Något kortslöt...';
        status.className = 'error';
        console.error(err);
      }
    });

    loadModel();
  </script>
</body>
</html>
